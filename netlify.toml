[build]
  command = "bash ./netlify-build.sh"
  publish = "public"

[build.environment]
  FLUTTER_VERSION = "3.41.7"

# SPA fallback for each Flutter app — refresh on /client/catalog must serve client's index.html.
[[redirects]]
  from = "/client/*"
  to = "/client/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/courier/*"
  to = "/courier/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache Flutter build artifacts aggressively (filenames are hashed by Flutter).
[[headers]]
  for = "/*/canvaskit/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
