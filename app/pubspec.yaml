name: aziza_food
description: "Aziza Food — premium food delivery (Almaty)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # HTTP
  dio: ^5.7.0

  # Models / immutable data
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # i18n
  intl: ^0.20.0

  # UI / design
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^3.0.6
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  shimmer: ^3.0.0

  # Storage
  shared_preferences: ^2.3.5

  # File / image picker (admin photo upload)
  image_picker: ^1.1.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/demo/
