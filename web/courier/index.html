<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#e8501e" />
  <title>Aziza Food — Курьер</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Login screen -->
    <section id="login" class="login" hidden>
      <form id="login-form" class="login__card" autocomplete="on">
        <div class="login__brand">
          <span class="login__logo">A</span>
          <div>
            <div class="login__title">Aziza Food</div>
            <div class="login__sub">Кабинет курьера</div>
          </div>
        </div>
        <label class="field">
          <span class="field__label">Телефон</span>
          <input id="login-phone" class="field__input" type="tel" inputmode="tel"
                 name="phone" placeholder="+7 700 000 00 00" autocomplete="username" required />
        </label>
        <label class="field">
          <span class="field__label">Пароль</span>
          <input id="login-password" class="field__input" type="password"
                 name="password" placeholder="••••••••" autocomplete="current-password" required />
        </label>
        <div id="login-error" class="login__error" hidden></div>
        <button id="login-btn" class="btn btn--primary btn--block btn--lg" type="submit">Войти</button>
      </form>
    </section>

    <!-- Board screen -->
    <section id="board" class="board" hidden>
      <header class="topbar">
        <div class="topbar__left">
          <span class="topbar__logo">A</span>
          <div class="topbar__who">
            <div class="topbar__name" id="courier-name">Курьер</div>
            <div class="topbar__role">Курьер</div>
          </div>
        </div>
        <div class="topbar__actions">
          <button id="refresh-btn" class="icon-btn" type="button" aria-label="Обновить" title="Обновить">⟳</button>
          <button id="logout-btn" class="btn btn--ghost" type="button">Выйти</button>
        </div>
      </header>

      <main id="feed" class="feed">
        <div id="feed-loading" class="feed__loading">Загрузка…</div>
      </main>
    </section>
  </div>

  <div id="toast-root" class="toast-root" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
